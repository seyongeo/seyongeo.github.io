<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>서울대 AMP99 · 월례회 성적 관리</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#080f08;font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:#101a10;}
::-webkit-scrollbar-thumb{background:#243424;border-radius:2px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const C = {
  bg:"#080f08", surface:"#101a10", card:"#162016", border:"#243424",
  accent:"#4ade80", accentLow:"rgba(74,222,128,0.12)", text:"#dff0df",
  dim:"#4d754d", gold:"#fbbf24", silver:"#94a3b8", bronze:"#b87333",
  pink:"#f9a8d4", blue:"#93c5fd", red:"#f87171",
};
const hdScore = (s,h) => parseFloat((s - h).toFixed(1));
const uid = () => Math.random().toString(36).slice(2,9);
const avg = (a) => a.length ? a.reduce((x,y)=>x+y,0)/a.length : 0;
const rankColor = (r) => r===1?C.gold:r===2?C.silver:r===3?C.bronze:C.text;


function parseMD(text) {
  try {
    const members = [];
    const memberSection = text.match(/## 회원 목록([\s\S]*?)(?=##|$)/);
    if (memberSection) {
      const rows = memberSection[1].split('\n').filter(l => l.startsWith('|') && !l.includes('---') && !l.includes('id'));
      rows.forEach(row => {
        const cols = row.split('|').map(c => c.trim()).filter(Boolean);
        if (cols.length >= 3) members.push({id:cols[0], name:cols[1], gender:cols[2]});
      });
    }
    const rounds = [];
    const roundBlocks = text.split(/### round: /);
    roundBlocks.slice(1).forEach(block => {
      const idMatch = block.match(/^(\S+)/);
      const dateMatch = block.match(/날짜:\s*(\S+)/);
      const courseMatch = block.match(/코스:\s*(.+)/);
      if (!idMatch || !dateMatch || !courseMatch) return;
      const scores = [];
      const tableRows = block.split('\n').filter(l => l.startsWith('|') && !l.includes('---') && !l.includes('회원id'));
      tableRows.forEach(row => {
        const cols = row.split('|').map(c => c.trim()).filter(Boolean);
        if (cols.length >= 7) {
          scores.push({
            memberId: cols[0],
            score: parseInt(cols[2]) || 0,
            hd: parseFloat(cols[3]) || 0,
            buddies: parseInt(cols[4]) || 0,
            pars: parseInt(cols[5]) || 0,
            bogeys: parseInt(cols[6]) || 0,
          });
        }
      });
      rounds.push({id:idMatch[1], date:dateMatch[1], course:courseMatch[1].trim(), scores});
    });
    if (members.length && rounds.length) return {members, rounds};
  } catch(e) {}
  return null;
}

function generateMD(members, rounds) {
  let md = '# 서울대 AMP99 골프 성적 데이터\n\n> 이 파일은 서울대 AMP99 월례회 성적 데이터입니다.\n> golf-manager.html 앱이 이 파일을 읽어 초기 데이터를 로드합니다.\n\n---\n\n## 회원 목록\n\n| id | 이름 | 성별 |\n|----|------|------|\n';
  members.forEach(m => { md += `| ${m.id} | ${m.name} | ${m.gender} |\n`; });
  md += '\n---\n\n## 라운드 기록\n';
  rounds.forEach(r => {
    md += `\n### round: ${r.id}\n- 날짜: ${r.date}\n- 코스: ${r.course}\n\n| 회원id | 이름 | 타수 | 핸디 | 버디 | 파 | 보기 |\n|--------|------|------|------|------|----|------|\n`;
    r.scores.forEach(s => {
      const m = members.find(x => x.id === s.memberId) || {name:'?'};
      md += `| ${s.memberId} | ${m.name} | ${s.score} | ${s.hd} | ${s.buddies} | ${s.pars} | ${s.bogeys} |\n`;
    });
  });
  return md;
}

function downloadMD(members, rounds) {
  const md = generateMD(members, rounds);
  const blob = new Blob([md], {type:'text/markdown'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'golf-scores.md'; a.click();
  URL.revokeObjectURL(url);
}

async function saveMDToGitHub(members, rounds) {
  const pat = localStorage.getItem('amp99_github_pat');
  if (!pat) {
    downloadMD(members, rounds);
    alert('GitHub PAT가 설정되지 않아 MD 파일을 다운로드했습니다.\n파일을 직접 커밋해 주세요.\n(설정 탭에서 PAT를 입력하면 자동 저장됩니다.)');
    return {ok: false, error: 'no_pat'};
  }
  try {
    const apiBase = 'https://api.github.com/repos/seyongeo/seyongeo.github.io/contents/golf/golf-scores.md';
    const shaRes = await fetch(apiBase, {
      headers: {'Authorization': `token ${pat}`, 'Accept': 'application/vnd.github+json'},
    });
    if (!shaRes.ok) { const t = await shaRes.text(); throw new Error(`SHA 조회 실패: ${shaRes.status} ${t}`); }
    const shaData = await shaRes.json();
    const sha = shaData.sha;
    const mdContent = generateMD(members, rounds);
    const encoded = btoa(unescape(encodeURIComponent(mdContent)));
    const putRes = await fetch(apiBase, {
      method: 'PUT',
      headers: {'Authorization': `token ${pat}`, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json'},
      body: JSON.stringify({message: 'Update golf-scores.md via AMP99 Golf Manager', content: encoded, sha}),
    });
    if (!putRes.ok) { const t = await putRes.text(); throw new Error(`저장 실패: ${putRes.status} ${t}`); }
    return {ok: true};
  } catch(e) {
    return {ok: false, error: e.message || String(e)};
  }
}

const iSt = {background:"#060c06",border:`1px solid ${C.border}`,color:C.text,borderRadius:7,padding:"8px 10px",fontSize:13,outline:"none",width:"100%",boxSizing:"border-box",fontFamily:"inherit"};
const thSt = {background:"#0d150d",color:C.dim,fontSize:11,padding:"8px 5px",textAlign:"center",whiteSpace:"nowrap"};
const tdSt = {fontSize:12,padding:"9px 5px",textAlign:"center",borderBottom:`1px solid #131b13`};
const cardSt = {background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px",marginBottom:10};
const btn = (v="d") => ({padding:"9px 16px",borderRadius:8,border:"none",cursor:"pointer",fontWeight:700,fontSize:13,fontFamily:"inherit",
  background:v==="p"?C.accent:v==="r"?C.red:v==="g"?"rgba(74,222,128,0.15)":C.surface,
  color:v==="p"?"#000":v==="g"?C.accent:C.text});
const gTag = (g) => ({fontSize:10,padding:"1px 5px",borderRadius:4,background:g==="여"?"rgba(249,168,212,0.18)":"rgba(147,197,253,0.12)",color:g==="여"?C.pink:C.blue});

function PhotoModal({members, onClose, onApply}) {
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('amp99_apikey') || '');
  const [imgData, setImgData] = useState(null);
  const [imgType, setImgType] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const fileRef = useRef();

  const handleFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const result = ev.target.result;
      const b64 = result.split(',')[1];
      setImgData(b64);
      setImgType(file.type || 'image/jpeg');
    };
    reader.readAsDataURL(file);
  };

  const analyze = async () => {
    if (!apiKey.trim()) { setError('API 키를 입력하세요'); return; }
    if (!imgData) { setError('이미지를 선택하세요'); return; }
    localStorage.setItem('amp99_apikey', apiKey.trim());
    setLoading(true); setError('');
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': apiKey.trim(),
          'anthropic-version': '2023-06-01',
          'content-type': 'application/json',
          'anthropic-dangerous-direct-browser-calls': 'true',
        },
        body: JSON.stringify({
          model: 'claude-opus-4-5',
          max_tokens: 2048,
          messages: [{
            role: 'user',
            content: [
              {type:'image', source:{type:'base64', media_type:imgType, data:imgData}},
              {type:'text', text:'이 골프 성적표 이미지에서 각 선수의 성적을 JSON 배열로 추출해주세요. 형식: [{name, gender, score, hd, buddies, pars, bogeys}]. gender는 "남" 또는 "여"(표에 표시된 경우), hd(핸디)는 소수점 포함 숫자, 나머지는 정수. 반드시 JSON만 응답하세요.'},
            ],
          }],
        }),
      });
      if (!res.ok) { const e = await res.text(); throw new Error(e); }
      const data = await res.json();
      const text = data.content[0].text.trim();
      const jsonStr = text.startsWith('[') ? text : text.match(/\[[\s\S]*\]/)?.[0];
      if (!jsonStr) throw new Error('JSON 파싱 실패');
      const extracted = JSON.parse(jsonStr);
      const matched = {};
      const newMembers = [];
      extracted.forEach(row => {
        const member = members.find(m => m.name === row.name || m.name.includes(row.name) || row.name.includes(m.name));
        if (member) {
          matched[member.id] = {on:true, score:String(row.score||''), hd:String(row.hd||''), buddies:row.buddies||0, pars:row.pars||0, bogeys:row.bogeys||0};
        } else {
          newMembers.push({name:row.name, gender:row.gender||'남', score:row.score, hd:row.hd, buddies:row.buddies||0, pars:row.pars||0, bogeys:row.bogeys||0});
        }
      });
      onApply(matched, newMembers, extracted.length);
      onClose();
    } catch(e) {
      setError('오류: ' + (e.message || String(e)));
    } finally { setLoading(false); }
  };

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.8)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:20,width:'100%',maxWidth:400}}>
        <div style={{fontWeight:700,color:C.accent,marginBottom:14,fontSize:15}}>📷 사진으로 성적 입력</div>
        <div style={{fontSize:11,color:C.dim,marginBottom:10}}>골프 성적표 사진을 업로드하면 AI가 자동으로 성적을 추출합니다.</div>
        <div style={{marginBottom:12}}>
          <div style={{fontSize:11,color:C.dim,marginBottom:4}}>Anthropic API 키</div>
          <input style={iSt} type="password" value={apiKey} placeholder="sk-ant-..." onChange={e=>setApiKey(e.target.value)}/>
          <div style={{fontSize:10,color:C.dim,marginTop:3}}>키는 localStorage에만 저장되며 외부로 전송되지 않습니다.</div>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,color:C.dim,marginBottom:4}}>성적표 이미지</div>
          <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleFile}/>
          <button style={{...btn("g"),width:'100%',padding:"10px 0"}} onClick={()=>fileRef.current.click()}>
            {imgData ? '✅ 이미지 선택됨 (변경하기)' : '🖼 이미지 선택'}
          </button>
        </div>
        {error && <div style={{color:C.red,fontSize:12,marginBottom:10,background:'rgba(248,113,113,0.1)',padding:'8px 10px',borderRadius:8}}>{error}</div>}
        <div style={{display:'flex',gap:8}}>
          <button style={{...btn('p'),flex:1}} onClick={analyze} disabled={loading}>
            {loading ? '분석 중...' : '🤖 AI 분석'}
          </button>
          <button style={btn()} onClick={onClose}>취소</button>
        </div>
      </div>
    </div>
  );
}

function SettingsTab({saveError}) {
  const [pat, setPat] = useState(() => localStorage.getItem('amp99_github_pat') || '');
  const [saved, setSaved] = useState(false);
  const savePat = () => {
    localStorage.setItem('amp99_github_pat', pat.trim());
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };
  return (
    <div>
      <div style={{...cardSt}}>
        <div style={{fontWeight:700,color:C.accent,marginBottom:10}}>GitHub 설정</div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,color:C.dim,marginBottom:4}}>GitHub Personal Access Token (MD 파일 저장에 필요)</div>
          <input style={iSt} type="password" value={pat} placeholder="ghp_..." onChange={e=>setPat(e.target.value)}/>
          <div style={{fontSize:10,color:C.dim,marginTop:4}}>
            PAT는 <code style={{background:C.surface,padding:"1px 4px",borderRadius:3}}>contents: write</code> 권한이 필요합니다. 미입력 시 MD 파일 다운로드로 대체됩니다.
          </div>
        </div>
        <button style={{...btn("p"),width:"100%"}} onClick={savePat}>PAT 저장</button>
        {saved && <div style={{marginTop:8,textAlign:"center",color:C.accent,fontSize:12}}>✓ 저장됨</div>}
      </div>
      {saveError && (
        <div style={{background:'rgba(248,113,113,0.1)',border:`1px solid ${C.red}`,borderRadius:10,padding:"12px 14px",color:C.red,fontSize:12}}>
          최근 저장 오류: {saveError}
        </div>
      )}
    </div>
  );
}

function App() {
  const [members, setMembers] = useState([]);
  const [rounds, setRounds]   = useState([]);
  const [tab, setTab]         = useState("view");
  const [sel, setSel]         = useState("");
  const [mode, setMode]       = useState("perio");
  const [form, setForm]       = useState({date:"", course:""});
  const [sc, setSc]           = useState({});
  const [mf, setMf]           = useState({name:"", gender:"남"});
  const [editId, setEditId]   = useState(null);
  const [delId, setDelId]     = useState(null);
  const [focus, setFocus]     = useState(null);
  const [showPhoto, setShowPhoto] = useState(false);
  const [loadError, setLoadError] = useState('');
  const [saveStatus, setSaveStatus] = useState(''); // '', 'saving', 'ok', 'error'
  const [saveError, setSaveError] = useState('');

  // Always load from golf-scores.md (single source of truth)
  useEffect(() => {
    fetch('./golf-scores.md?' + Date.now())
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
      .then(text => {
        const parsed = parseMD(text);
        if (!parsed) throw new Error('golf-scores.md 파싱 실패');
        setMembers(parsed.members); setRounds(parsed.rounds);
        setSel(parsed.rounds.length ? [...parsed.rounds].sort((a,b)=>b.date.localeCompare(a.date))[0].id : '');
      })
      .catch(e => {
        setLoadError('데이터 로드 실패: ' + (e.message || String(e)));
      });
  }, []);

  const triggerSave = async (newMembers, newRounds) => {
    setSaveStatus('saving'); setSaveError('');
    const result = await saveMDToGitHub(newMembers, newRounds);
    if (result.ok) {
      setSaveStatus('ok');
      setTimeout(() => setSaveStatus(''), 2500);
    } else if (result.error === 'no_pat') {
      setSaveStatus('');
    } else {
      setSaveStatus('error'); setSaveError(result.error || '알 수 없는 오류');
    }
  };

  const gm = (id) => members.find(m => m.id === id) || {name:"?", gender:"남"};
  const cur = rounds.find(r => r.id === sel) || rounds[0];
  const enrich = (r) => r.scores.map(s => ({...s, hs:hdScore(s.score, s.hd), member:gm(s.memberId)}));
  const gross = cur ? enrich(cur).sort((a,b)=>a.score-b.score).map((s,i)=>({...s,rank:i+1})) : [];
  const perio = cur ? enrich(cur).sort((a,b)=>a.hs-b.hs).map((s,i)=>({...s,rank:i+1})) : [];
  const disp  = mode === "perio" ? perio : gross;
  const teamAvg = cur ? avg(cur.scores.map(s=>s.score)).toFixed(1) : "-";

  const goEntry = () => {
    setForm({date:new Date().toISOString().slice(0,10), course:""});
    const init = {};
    members.forEach(m => { init[m.id] = {on:true, score:"", hd:"", buddies:0, pars:0, bogeys:0}; });
    setSc(init); setTab("entry");
  };

  const saveRound = () => {
    if (!form.date || !form.course.trim()) { alert("날짜와 코스명을 입력하세요"); return; }
    const list = Object.entries(sc)
      .filter(([,v]) => v.on && v.score !== "" && v.hd !== "")
      .map(([mid,v]) => ({memberId:mid, score:+v.score, hd:+v.hd, buddies:+v.buddies||0, pars:+v.pars||0, bogeys:+v.bogeys||0}));
    if (!list.length) { alert("성적을 입력하세요"); return; }
    const nr = {id:uid(), date:form.date, course:form.course, scores:list};
    const newRounds = [...rounds, nr];
    setRounds(newRounds); setSel(nr.id); setTab("view");
    triggerSave(members, newRounds);
  };

  const saveMember = () => {
    if (!mf.name.trim()) return;
    let newMembers;
    if (editId) {
      newMembers = members.map(m => m.id===editId ? {...m,...mf} : m);
      setMembers(newMembers); setEditId(null);
    } else {
      newMembers = [...members, {id:uid(), ...mf}];
      setMembers(newMembers);
    }
    setMf({name:"", gender:"남"});
    triggerSave(newMembers, rounds);
  };

  const deleteMember = (id) => {
    const newMembers = members.filter(x => x.id !== id);
    setMembers(newMembers); setDelId(null);
    triggerSave(newMembers, rounds);
  };

  const applyPhoto = (matched, newMembers, total) => {
    let addedNames = [];
    if (newMembers.length > 0) {
      const created = newMembers.map(nm => ({id:uid(), name:nm.name, gender:nm.gender||'남'}));
      setMembers(p => [...p, ...created]);
      created.forEach((m, i) => {
        const nm = newMembers[i];
        matched[m.id] = {on:true, score:String(nm.score||''), hd:String(nm.hd||''), buddies:nm.buddies||0, pars:nm.pars||0, bogeys:nm.bogeys||0};
      });
      addedNames = created.map(m => m.name);
    }
    setSc(p => {
      const next = {...p};
      Object.entries(matched).forEach(([id, vals]) => { next[id] = {...(next[id]||{}), ...vals}; });
      return next;
    });
    const lines = [`${total}명 중 ${Object.keys(matched).length}명 자동 입력`];
    if (addedNames.length) lines.push(`신규 회원 추가: ${addedNames.join(', ')}`);
    alert(lines.join('\n'));
    // 신규 회원이 추가된 경우 즉시 MD에 저장
    if (addedNames.length > 0) {
      triggerSave([...members, ...created], rounds);
    }
  };

  const stats = members.map(m => {
    const h = rounds.flatMap(r => r.scores.filter(s => s.memberId===m.id).map(s => ({...s, date:r.date, course:r.course})));
    if (!h.length) return null;
    const sc2 = h.map(x => x.score);
    return {...m, hist:h, games:h.length, avg:avg(sc2).toFixed(1), best:Math.min(...sc2), avgHd:avg(h.map(x=>x.hd)).toFixed(1), buds:h.reduce((a,x)=>a+(x.buddies||0),0)};
  }).filter(Boolean).sort((a,b) => parseFloat(a.avg)-parseFloat(b.avg));

  const numIn = (field, mid, w=44) => (
    <input type="number" min="0"
      style={{background:"#060c06",border:`1px solid ${C.border}`,color:sc[mid]?.on===false?C.dim:C.text,borderRadius:5,padding:"4px 3px",width:w,textAlign:"center",fontSize:12,outline:"none",fontFamily:"inherit"}}
      value={sc[mid]?.[field] ?? ""} disabled={sc[mid]?.on===false}
      onChange={e => setSc(p => ({...p,[mid]:{...p[mid],[field]:e.target.value}}))} placeholder="0"/>
  );

  return (
    <div style={{background:C.bg,minHeight:"100vh",color:C.text,fontFamily:"'Apple SD Gothic Neo','Noto Sans KR',sans-serif",display:"flex",flexDirection:"column",maxWidth:540,margin:"0 auto"}}>
      {showPhoto && <PhotoModal members={members} onClose={()=>setShowPhoto(false)} onApply={applyPhoto}/>}

      {/* 헤더 */}
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"11px 16px",display:"flex",alignItems:"center",gap:10,position:"sticky",top:0,zIndex:10}}>
        <span style={{fontSize:22}}>⛳</span>
        <div>
          <div style={{fontSize:15,fontWeight:800,color:C.accent,letterSpacing:"-0.5px"}}>서울대 AMP99</div>
          <div style={{fontSize:10,color:C.dim}}>월례회 성적 관리</div>
        </div>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
          {saveStatus==='saving' && <span style={{fontSize:11,color:C.dim}}>저장 중...</span>}
          {saveStatus==='ok' && <span style={{fontSize:11,color:C.accent}}>✓ 저장됨</span>}
          {saveStatus==='error' && <span style={{fontSize:11,color:C.red}} title={saveError}>⚠ 저장 실패</span>}
          <button style={{...btn("g"),padding:"5px 10px",fontSize:11}} onClick={()=>downloadMD(members,rounds)}>⬇ MD</button>
          <span style={{fontSize:11,color:C.dim}}>{rounds.length}라운드·{members.length}명</span>
        </div>
      </div>

      <div style={{flex:1,padding:"12px 13px",overflowY:"auto"}}>

        {loadError && (
          <div style={{background:'rgba(248,113,113,0.1)',border:`1px solid ${C.red}`,borderRadius:10,padding:"12px 14px",marginBottom:12,color:C.red,fontSize:13}}>
            ⚠ {loadError}
          </div>
        )}

        {/* ── 로딩 ── */}
        {loading && <div style={{textAlign:"center",padding:48,color:C.dim}}>⏳ golf-scores.md 로딩 중...</div>}

        {/* ── 성적 조회 ── */}
        {!loading && tab==="view" && cur && (<>
          <select style={{...iSt,marginBottom:12}} value={sel} onChange={e=>setSel(e.target.value)}>
            {[...rounds].sort((a,b)=>b.date.localeCompare(a.date)).map(r=>(
              <option key={r.id} value={r.id}>{r.date} · {r.course} ({r.scores.length}명)</option>
            ))}
          </select>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:12}}>
            {[
              {label:"🥇 메달리스트",  name:gross[0]?.member.name, val:gross[0]?.score, color:C.gold},
              {label:"🏆 페리오 우승", name:perio[0]?.member.name, val:perio[0]?.hs.toFixed(1), color:C.accent},
              {label:"🥈 준우승",      name:perio[1]?.member.name, val:perio[1]?.hs.toFixed(1), color:C.silver},
            ].map(x=>(
              <div key={x.label} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 8px",textAlign:"center",borderTop:`2px solid ${x.color}`}}>
                <div style={{fontSize:9,color:C.dim,marginBottom:3}}>{x.label}</div>
                <div style={{fontSize:12,fontWeight:700,color:x.color,marginBottom:1}}>{x.name}</div>
                <div style={{fontSize:22,fontWeight:800,color:C.accent,lineHeight:1.2}}>{x.val}</div>
              </div>
            ))}
          </div>

          <div style={{display:"flex",gap:7,marginBottom:10}}>
            {[["perio","신(더블)페리오"],["gross","그로스"]].map(([v,l])=>(
              <button key={v} onClick={()=>setMode(v)}
                style={{flex:1,padding:"8px 0",borderRadius:8,border:`1px solid ${mode===v?C.accent:C.border}`,background:mode===v?C.accentLow:"transparent",color:mode===v?C.accent:C.dim,fontSize:12,fontWeight:mode===v?700:400,cursor:"pointer",fontFamily:"inherit"}}>{l}</button>
            ))}
          </div>

          <div style={{...cardSt,padding:0,overflow:"hidden"}}>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",minWidth:400}}>
                <thead><tr>
                  {["순위","이름","","타수","핸디","핸디점수","버디","파","보기"].map((h,i)=>(
                    <th key={i} style={{...thSt,textAlign:i===1?"left":"center",paddingLeft:i===1?8:5}}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>
                  {disp.map(row=>(
                    <tr key={row.memberId} style={{background:row.rank===1?"rgba(251,191,36,0.05)":"transparent"}}>
                      <td style={tdSt}>
                        <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:22,height:22,borderRadius:"50%",
                          background:row.rank<=3?rankColor(row.rank):"transparent",
                          color:row.rank<=3?"#000":C.dim,fontSize:12,fontWeight:700}}>{row.rank}</span>
                      </td>
                      <td style={{...tdSt,textAlign:"left",paddingLeft:8,fontWeight:row.rank<=3?700:500,color:rankColor(row.rank)}}>{row.member.name}</td>
                      <td style={tdSt}><span style={gTag(row.member.gender)}>{row.member.gender}</span></td>
                      <td style={{...tdSt,fontWeight:600}}>{row.score}</td>
                      <td style={{...tdSt,color:C.dim}}>{row.hd}</td>
                      <td style={{...tdSt,fontWeight:700,color:row.rank<=3?rankColor(row.rank):C.accent}}>{row.hs.toFixed(1)}</td>
                      <td style={{...tdSt,color:row.buddies>0?C.accent:C.dim}}>{row.buddies>0?`★${row.buddies}`:"—"}</td>
                      <td style={tdSt}>{row.pars}</td>
                      <td style={tdSt}>{row.bogeys}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
          <div style={{textAlign:"center",color:C.dim,fontSize:11,marginTop:5,marginBottom:8}}>
            {cur.date} · {cur.course} · 팀 평균 {teamAvg}타 · {cur.scores.length}명 참가
          </div>
        </>)}

        {/* ── 성적 입력 ── */}
        {tab==="entry" && (<>
          <div style={cardSt}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div style={{fontWeight:700,color:C.accent}}>새 라운드 입력</div>
              <button style={{...btn("g"),padding:"6px 12px",fontSize:12}} onClick={()=>setShowPhoto(true)}>📷 사진으로 입력</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div>
                <div style={{fontSize:11,color:C.dim,marginBottom:4}}>날짜</div>
                <input type="date" style={iSt} value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))}/>
              </div>
              <div>
                <div style={{fontSize:11,color:C.dim,marginBottom:4}}>코스명</div>
                <input type="text" style={iSt} value={form.course} onChange={e=>setForm(p=>({...p,course:e.target.value}))} placeholder="예: 남서울 CC"/>
              </div>
            </div>
          </div>
          <div style={{fontSize:11,color:C.dim,marginBottom:8}}>미참가 회원은 체크 해제 · 핸디점수 자동계산</div>
          <div style={{...cardSt,padding:0,overflow:"hidden"}}>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",minWidth:360}}>
                <thead><tr>
                  {["✓","이름","타수","핸디","핸디점수","버디","파","보기"].map((h,i)=>(
                    <th key={i} style={{...thSt,textAlign:i===1?"left":"center",paddingLeft:i===1?8:5}}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>
                  {members.map(m => {
                    const es = sc[m.id] || {};
                    const off = es.on === false;
                    const upd = (f,v) => setSc(p => ({...p,[m.id]:{...p[m.id],[f]:v}}));
                    const hs = es.score && es.hd!=="" ? hdScore(+es.score,+es.hd).toFixed(1) : "—";
                    return (
                      <tr key={m.id} style={{opacity:off?0.4:1}}>
                        <td style={tdSt}><input type="checkbox" checked={!off} onChange={e=>upd("on",e.target.checked)}/></td>
                        <td style={{...tdSt,textAlign:"left",paddingLeft:8,fontWeight:500,whiteSpace:"nowrap"}}>
                          {m.name} <span style={{fontSize:10,color:m.gender==="여"?C.pink:C.blue}}>{m.gender}</span>
                        </td>
                        <td style={tdSt}>{numIn("score",m.id,48)}</td>
                        <td style={tdSt}>{numIn("hd",m.id,44)}</td>
                        <td style={{...tdSt,fontWeight:600,color:C.accent}}>{hs}</td>
                        <td style={tdSt}>{numIn("buddies",m.id,36)}</td>
                        <td style={tdSt}>{numIn("pars",m.id,36)}</td>
                        <td style={tdSt}>{numIn("bogeys",m.id,36)}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
          <div style={{display:"flex",gap:8,marginTop:12,paddingBottom:16}}>
            <button style={btn("p")} onClick={saveRound}>저장</button>
            <button style={btn()} onClick={goEntry}>초기화</button>
            <button style={btn()} onClick={()=>setTab("view")}>취소</button>
          </div>
        </>)}

        {/* ── 회원 관리 ── */}
        {tab==="members" && (<>
          <div style={cardSt}>
            <div style={{fontWeight:700,color:C.accent,marginBottom:10}}>{editId?"회원 수정":"회원 추가"}</div>
            <div style={{display:"flex",gap:8}}>
              <input style={{...iSt,flex:1}} value={mf.name} placeholder="이름"
                onChange={e=>setMf(p=>({...p,name:e.target.value}))}
                onKeyDown={e=>e.key==="Enter"&&saveMember()}/>
              <select style={{...iSt,width:62}} value={mf.gender} onChange={e=>setMf(p=>({...p,gender:e.target.value}))}>
                <option value="남">남</option><option value="여">여</option>
              </select>
              <button style={btn("p")} onClick={saveMember}>{editId?"수정":"추가"}</button>
              {editId&&<button style={btn()} onClick={()=>{setEditId(null);setMf({name:"",gender:"남"});}}>취소</button>}
            </div>
          </div>
          <div style={{fontSize:12,color:C.dim,marginBottom:8}}>총 {members.length}명</div>
          {members.map((m,i)=>(
            <div key={m.id} style={{...cardSt,display:"flex",alignItems:"center",padding:"9px 13px",marginBottom:6}}>
              <span style={{color:C.dim,fontSize:11,width:24}}>{i+1}.</span>
              <span style={{flex:1,fontWeight:500}}>{m.name}</span>
              <span style={{...gTag(m.gender),marginRight:10}}>{m.gender}</span>
              {delId===m.id?(<>
                <button style={{...btn("r"),padding:"5px 9px",fontSize:11,marginRight:5}}
                  onClick={()=>deleteMember(m.id)}>확인</button>
                <button style={{...btn(),padding:"5px 9px",fontSize:11}} onClick={()=>setDelId(null)}>취소</button>
              </>):(<>
                <button style={{...btn(),padding:"5px 9px",fontSize:11,marginRight:5}}
                  onClick={()=>{setEditId(m.id);setMf({name:m.name,gender:m.gender});}}>수정</button>
                <button style={{...btn("r"),padding:"5px 9px",fontSize:11}} onClick={()=>setDelId(m.id)}>삭제</button>
              </>)}
            </div>
          ))}
        </>)}

        {/* ── 설정 ── */}
        {tab==="settings" && <SettingsTab saveError={saveError}/>}

        {/* ── 통계 ── */}
        {tab==="stats" && (<>
          <div style={cardSt}>
            <div style={{fontWeight:700,color:C.accent,marginBottom:10}}>전체 통계</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,textAlign:"center"}}>
              {[
                {label:"라운드",val:`${rounds.length}회`},
                {label:"참가자",val:`${stats.length}명`},
                {label:"그룹평균",val:stats.length?avg(stats.map(m=>parseFloat(m.avg))).toFixed(1):"-"},
                {label:"최저타",val:stats.length?Math.min(...stats.map(m=>m.best)):"-"},
              ].map(x=>(
                <div key={x.label}>
                  <div style={{fontSize:9,color:C.dim,marginBottom:2}}>{x.label}</div>
                  <div style={{fontSize:18,fontWeight:800,color:C.accent}}>{x.val}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={{fontSize:11,color:C.dim,marginBottom:8}}>카드를 탭하면 상세 기록 확인</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
            {stats.map((m,i)=>(
              <div key={m.id} style={{...cardSt,marginBottom:0,cursor:"pointer",borderColor:focus===m.id?C.accent:C.border}}
                onClick={()=>setFocus(focus===m.id?null:m.id)}>
                <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:7}}>
                  <span style={{fontSize:10,color:C.dim,fontWeight:700}}>{i+1}위</span>
                  <span style={{fontWeight:700,fontSize:13}}>{m.name}</span>
                  <span style={gTag(m.gender)}>{m.gender}</span>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:3,fontSize:11}}>
                  <div><span style={{color:C.dim}}>평균 </span><span style={{fontWeight:700,color:C.accent}}>{m.avg}</span></div>
                  <div><span style={{color:C.dim}}>베스트 </span><span style={{fontWeight:700,color:C.gold}}>{m.best}</span></div>
                  <div><span style={{color:C.dim}}>참가 </span><span>{m.games}회</span></div>
                  <div><span style={{color:C.dim}}>버디 </span><span style={{color:m.buds>0?C.accent:C.dim}}>★{m.buds}</span></div>
                </div>
              </div>
            ))}
          </div>
          {focus&&(()=>{
            const m=stats.find(x=>x.id===focus);if(!m)return null;
            return(
              <div style={cardSt}>
                <div style={{fontWeight:700,color:C.accent,marginBottom:10}}>{m.name} · {m.games}회 · 평균핸디 {m.avgHd}</div>
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead><tr>{["날짜","코스","타수","핸디","핸디점수","버디"].map(h=><th key={h} style={thSt}>{h}</th>)}</tr></thead>
                  <tbody>
                    {m.hist.sort((a,b)=>b.date.localeCompare(a.date)).map((h,i)=>(
                      <tr key={i}>
                        <td style={tdSt}>{h.date}</td>
                        <td style={{...tdSt,fontSize:10,color:C.dim}}>{h.course}</td>
                        <td style={{...tdSt,fontWeight:700,color:h.score===m.best?C.gold:C.text}}>{h.score}</td>
                        <td style={{...tdSt,color:C.dim}}>{h.hd}</td>
                        <td style={{...tdSt,fontWeight:600,color:C.accent}}>{hdScore(h.score,h.hd).toFixed(1)}</td>
                        <td style={{...tdSt,color:h.buddies>0?C.accent:C.dim}}>{h.buddies>0?`★${h.buddies}`:"—"}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            );
          })()}
        </>)}
      </div>

      {/* 탭 바 */}
      <div style={{display:"flex",background:C.surface,borderTop:`1px solid ${C.border}`,position:"sticky",bottom:0}}>
        {[["view","🏆","성적조회"],["entry","✏️","성적입력"],["members","👥","회원관리"],["stats","📊","통계"],["settings","⚙️","설정"]].map(([id,icon,label])=>(
          <button key={id} onClick={()=>id==="entry"?goEntry():setTab(id)}
            style={{flex:1,padding:"10px 0",border:"none",background:"none",color:tab===id?C.accent:C.dim,fontSize:10,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,fontFamily:"inherit",borderTop:`2px solid ${tab===id?C.accent:"transparent"}`}}>
            <span style={{fontSize:19}}>{icon}</span>
            <span style={{fontWeight:tab===id?700:400}}>{label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
