<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seyongeo Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e1a;
            --surface: #141925;
            --surface-elevated: #1c2331;
            --surface-hover: #1f2840;
            --border: #252d3f;
            --text-primary: #e4e8f0;
            --text-secondary: #8b95a8;
            --text-tertiary: #5a6375;
            --accent: #4f7cff;
            --accent-light: #6b91ff;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --purple: #a855f7;
            --cyan: #06b6d4;
            --orange: #f97316;
            --pink: #ec4899;
            --teal: #14b8a6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Instrument Sans', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            font-size: 13px;
        }
        body::before {
            content: '';
            position: fixed; top: -30%; right: -10%;
            width: 700px; height: 700px;
            background: radial-gradient(circle, rgba(79,124,255,0.08) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none; z-index: 0;
        }
        body::after {
            content: '';
            position: fixed; bottom: -20%; left: -10%;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(168,85,247,0.07) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none; z-index: 0;
        }
        .layout {
            position: relative; z-index: 1;
            max-width: 1060px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .logo-icon {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            box-shadow: 0 0 20px rgba(79,124,255,0.3);
        }
        .logo-text h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
        .logo-text span { font-size: 11px; color: var(--text-tertiary); font-family: 'JetBrains Mono', monospace; }

        /* ── Tab switch ── */
        .tab-bar {
            display: flex;
            align-items: center;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 4px;
            gap: 2px;
            flex-shrink: 0;
        }
        .tab-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 16px;
            border: none;
            border-radius: 7px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Instrument Sans', -apple-system, sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, color 0.15s, box-shadow 0.15s;
            white-space: nowrap;
        }
        .tab-btn:hover { color: var(--text-primary); background: var(--surface-hover); }
        .tab-btn.active {
            background: var(--surface-elevated);
            color: var(--accent-light);
            box-shadow: 0 0 0 1px var(--border), 0 2px 8px rgba(0,0,0,0.3);
        }
        .tab-btn svg { flex-shrink: 0; }

        /* Header right side — search only visible in explorer */
        .header-right {
            flex: 1;
            display: flex;
            justify-content: flex-end;
        }
        .search-bar {
            flex: 1;
            max-width: 320px;
            position: relative;
            display: none;
        }
        .search-bar.visible { display: block; }
        .search-bar input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 32px 8px 34px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-bar input::placeholder { color: var(--text-tertiary); }
        .search-bar input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79,124,255,0.12);
        }
        .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-tertiary); pointer-events: none; }
        .search-clear { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-tertiary); cursor: pointer; font-size: 13px; display: none; padding: 0 2px; }
        .search-clear:hover { color: var(--text-secondary); }

        /* ── View panels ── */
        .view { display: none; }
        .view.active { display: block; }

        /* ════════════════════════════════════
           DASHBOARD VIEW
        ════════════════════════════════════ */
        .hero { margin-bottom: 40px; margin-top: 8px; }
        .hero h2 { font-size: 34px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.25; margin-bottom: 12px; }
        .hero h2 .accent {
            background: linear-gradient(90deg, var(--accent-light), var(--cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .hero p { font-size: 14px; color: var(--text-secondary); max-width: 520px; }

        .section-label {
            font-size: 11px; font-weight: 600; letter-spacing: 1.2px;
            text-transform: uppercase; color: var(--text-tertiary);
            margin-bottom: 14px; font-family: 'JetBrains Mono', monospace;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 12px;
            margin-bottom: 40px;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px 22px;
            text-decoration: none;
            color: inherit;
            display: flex; flex-direction: column; gap: 9px;
            transition: border-color 0.2s, background 0.2s, transform 0.15s, box-shadow 0.2s;
        }
        .card:hover {
            border-color: var(--accent);
            background: var(--surface-elevated);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5), 0 0 0 1px rgba(79,124,255,0.15);
        }
        .card-top { display: flex; align-items: center; justify-content: space-between; }
        .card-icon { width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .card-arrow { color: var(--text-tertiary); font-size: 15px; transition: color 0.2s, transform 0.2s; }
        .card:hover .card-arrow { color: var(--accent); transform: translateX(3px); }
        .card-title { font-size: 14px; font-weight: 600; line-height: 1.4; }
        .card-desc { font-size: 12px; color: var(--text-tertiary); }
        .card-badge {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 10px; font-weight: 600; font-family: 'JetBrains Mono', monospace;
            padding: 2px 8px; border-radius: 20px; width: fit-content;
        }
        .icon-blue   { background: rgba(79,124,255,0.15); }
        .icon-purple { background: rgba(168,85,247,0.15); }
        .icon-cyan   { background: rgba(6,182,212,0.15); }
        .icon-green  { background: rgba(34,197,94,0.15); }
        .icon-orange { background: rgba(249,115,22,0.15); }
        .icon-yellow { background: rgba(245,158,11,0.15); }
        .icon-pink   { background: rgba(236,72,153,0.15); }
        .icon-teal   { background: rgba(20,184,166,0.15); }
        .badge-blue   { background: rgba(79,124,255,0.12); color: var(--accent-light); }
        .badge-purple { background: rgba(168,85,247,0.12); color: #c084fc; }
        .badge-cyan   { background: rgba(6,182,212,0.12); color: var(--cyan); }
        .badge-green  { background: rgba(34,197,94,0.12); color: var(--success); }
        .badge-orange { background: rgba(249,115,22,0.12); color: #fb923c; }
        .badge-yellow { background: rgba(245,158,11,0.12); color: var(--warning); }
        .badge-pink   { background: rgba(236,72,153,0.12); color: #f472b6; }
        .badge-teal   { background: rgba(20,184,166,0.12); color: #2dd4bf; }
        .divider { height: 1px; background: var(--border); margin: 32px 0; }

        /* ════════════════════════════════════
           DASHBOARD CARDS
        ════════════════════════════════════ */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 12px;
            margin-top: 8px;
        }
        .fcard {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px 20px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            gap: 6px;
            transition: border-color 0.2s, background 0.2s, transform 0.15s, box-shadow 0.2s;
        }
        .fcard:hover {
            border-color: var(--accent);
            background: var(--surface-elevated);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4), 0 0 0 1px rgba(79,124,255,0.12);
        }
        .fcard-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.4;
        }
        .fcard:hover .fcard-title { color: var(--accent-light); }
        .fcard-filename {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-tertiary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .fcard-meta {
            display: flex;
            justify-content: space-between;
            margin-top: 4px;
        }
        .fcard-date, .fcard-size {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-tertiary);
        }

        /* ════════════════════════════════════
           EXPLORER VIEW
        ════════════════════════════════════ */
        .toolbar {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 8px;
        }
        .toolbar-btn {
            background: none; border: 1px solid var(--border);
            border-radius: 6px; color: var(--text-secondary);
            font-size: 11px; font-family: 'JetBrains Mono', monospace;
            padding: 5px 10px; cursor: pointer;
            transition: border-color 0.15s, color 0.15s, background 0.15s;
        }
        .toolbar-btn:hover { border-color: var(--accent); color: var(--accent-light); background: rgba(79,124,255,0.06); }
        .file-count { margin-left: auto; font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--text-tertiary); }

        .explorer { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .col-header {
            display: grid; grid-template-columns: 1fr 88px 140px;
            padding: 9px 16px;
            background: var(--surface-elevated);
            border-bottom: 1px solid var(--border);
            font-size: 11px; font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-tertiary); letter-spacing: 0.6px;
            text-transform: uppercase; user-select: none;
        }
        .col-size { text-align: right; }
        .col-date { text-align: right; padding-right: 4px; }

        .tree { list-style: none; }
        .tree-row {
            display: grid; grid-template-columns: 1fr 88px 140px;
            align-items: center; padding: 0 16px; height: 36px;
            cursor: pointer; transition: background 0.12s;
            text-decoration: none; color: inherit;
        }
        .tree-row:hover { background: var(--surface-hover); }
        .row-name { display: flex; align-items: center; min-width: 0; }
        .indent { display: inline-block; flex-shrink: 0; }
        .chevron {
            width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center;
            flex-shrink: 0; color: var(--text-tertiary); font-size: 10px; transition: transform 0.18s;
        }
        .chevron.open { transform: rotate(90deg); }
        .file-icon { width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; margin-right: 7px; }
        .row-label { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .folder-label { font-weight: 500; }
        .tree-row:hover .file-link { color: var(--accent-light); text-decoration: underline; }
        .row-size { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-tertiary); text-align: right; }
        .row-date { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-tertiary); text-align: right; padding-right: 4px; }

        .type-badge {
            font-size: 9px; font-weight: 700; font-family: 'JetBrains Mono', monospace;
            padding: 1px 5px; border-radius: 3px; margin-left: 8px; flex-shrink: 0;
            opacity: 0; transition: opacity 0.15s;
        }
        .tree-row:hover .type-badge { opacity: 1; }
        .badge-html  { background: rgba(249,115,22,0.15); color: #fb923c; }
        .badge-json  { background: rgba(245,158,11,0.15); color: #fbbf24; }
        .badge-md    { background: rgba(79,124,255,0.15); color: var(--accent-light); }
        .badge-zip   { background: rgba(168,85,247,0.15); color: #c084fc; }
        .badge-txt   { background: rgba(139,149,168,0.12); color: var(--text-secondary); }
        .badge-dir   { background: rgba(6,182,212,0.12); color: var(--cyan); }

        .folder-children { overflow: hidden; transition: max-height 0.22s ease; }
        .folder-children.collapsed { max-height: 0; }
        .folder-children .tree-row { background: rgba(0,0,0,0.12); }
        .folder-children .tree-row:hover { background: var(--surface-hover); }
        .tree-sep { height: 1px; background: var(--border); }

        .empty-state { display: none; padding: 48px 24px; text-align: center; color: var(--text-tertiary); font-size: 13px; }
        .empty-state svg { margin-bottom: 12px; opacity: 0.35; }

        /* ── Footer ── */
        .footer { margin-top: 32px; text-align: center; font-size: 11px; color: var(--text-tertiary); font-family: 'JetBrains Mono', monospace; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="layout">

    <!-- ── Header ── -->
    <header class="header">
        <div class="logo">
            <div class="logo-icon">⚡</div>
            <div class="logo-text">
                <h1>seyongeo Workspace</h1>
                <span>Project Management System</span>
            </div>
        </div>

        <div class="tab-bar">
            <button class="tab-btn active" id="tab-dashboard" onclick="switchView('dashboard')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                대시보드
            </button>
            <button class="tab-btn" id="tab-explorer" onclick="switchView('explorer')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7c0-1.1.9-2 2-2h4l2 2h8c1.1 0 2 .9 2 2v9c0 1.1-.9 2-2 2H5c-1.1 0-2-.9-2-2V7z"/></svg>
                파일 탐색기
            </button>
        </div>

        <div class="header-right">
            <div class="search-bar" id="searchBarWrap">
                <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <input type="text" id="searchInput" placeholder="파일 검색..." autocomplete="off">
                <button class="search-clear" id="searchClear">✕</button>
            </div>
        </div>
    </header>

    <!-- ══════════════════════════════════════
         DASHBOARD VIEW
    ══════════════════════════════════════ -->
    <div class="view active" id="view-dashboard">
        <div id="dashboard-loader" style="color:var(--text-tertiary);text-align:center;padding:48px;font-size:13px">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 1s linear infinite;margin-bottom:8px;display:block;margin-left:auto;margin-right:auto"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
            저장소 파일 목록 로딩 중...
        </div>
        <div id="dashboard-content" style="display:none"></div>
    </div>

    <!-- ══════════════════════════════════════
         EXPLORER VIEW
    ══════════════════════════════════════ -->
    <div class="view" id="view-explorer">

        <div class="toolbar">
            <button class="toolbar-btn" id="expandAll">▶ 모두 펼치기</button>
            <button class="toolbar-btn" id="collapseAll">▼ 모두 접기</button>
            <button class="toolbar-btn" id="refreshBtn" title="저장소 파일 목록 새로고침">↻ 새로고침</button>
            <span class="file-count" id="fileCount">— items</span>
        </div>

        <div class="explorer">
            <div class="col-header">
                <span>이름</span>
                <span class="col-size">크기</span>
                <span class="col-date">수정일</span>
            </div>

            <ul class="tree" id="fileTree">
            </ul>

            <div class="empty-state" id="emptyState">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <div>검색 결과가 없습니다</div>
            </div>
        </div>

    </div>

    <footer class="footer">seyongeo Workspace · seyongeo.github.io · 2026</footer>
</div>

<script>
// ════════════════════════════════════════════════════════════════════
//  CONFIG — 새 프로젝트 추가 시 이 맵에 메타 정보를 등록하세요.
//  등록하지 않아도 폴더/파일은 자동으로 대시보드와 탐색기에 표시됩니다.
// ════════════════════════════════════════════════════════════════════
const PROJECT_META = {
    'golf':            { icon: '⛳', label: 'AMP99 Golf Manager',  color: '#4ade80' },
    'project-mockup':  { icon: '📋', label: '프로젝트 관리 목업',  color: null },
};

// 탐색기엔 표시하되 대시보드 앱 섹션에서는 제외할 폴더
const ARCHIVE_DIRS    = new Set(['.git', '.claude', 'node_modules', 'files', 'files 2']);
// 대시보드에서 제외할 루트 파일
const SKIP_DASH_FILES = new Set(['index.html']);

const REPO      = 'seyongeo/seyongeo.github.io';
const BRANCH    = 'main';
const CACHE_KEY = 'ws_tree_v4';

// ── SVG icon helpers ──
const _rect = (fill, stroke, body) =>
    `<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>${body}</svg>`;
const ICONS = {
    html: _rect('rgba(249,115,22,0.2)','rgba(249,115,22,0.6)','<path d="M7 8h10M7 12h7M7 16h5" stroke="rgba(249,115,22,0.9)" stroke-width="1.5" stroke-linecap="round"/>'),
    md:   _rect('rgba(79,124,255,0.2)', 'rgba(79,124,255,0.6)', '<path d="M7 8h10M7 12h10M7 16h6" stroke="rgba(79,124,255,0.9)" stroke-width="1.5" stroke-linecap="round"/>'),
    json: _rect('rgba(245,158,11,0.2)', 'rgba(245,158,11,0.6)', '<path d="M8 7c-1 0-2 .9-2 2v2c0 .6-.4 1-1 1 .6 0 1 .4 1 1v2c0 1.1 1 2 2 2M16 7c1 0 2 .9 2 2v2c0 .6.4 1 1 1-.6 0-1 .4-1 1v2c0 1.1-1 2-2 2" stroke="rgba(245,158,11,0.9)" stroke-width="1.5" stroke-linecap="round"/>'),
    zip:  `<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" fill="rgba(168,85,247,0.2)" stroke="rgba(168,85,247,0.6)" stroke-width="1.5"/><path d="M12 3v8m0 0-2-2m2 2 2-2" stroke="rgba(168,85,247,0.9)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 15h1v2H9v-2zm5 0h1v2h-1v-2zm-5 2h1v2H9v-2zm5 0h1v2h-1v-2z" fill="rgba(168,85,247,0.9)"/></svg>`,
    file: _rect('rgba(139,149,168,0.15)','rgba(139,149,168,0.4)','<path d="M7 8h10M7 12h6M7 16h4" stroke="rgba(139,149,168,0.7)" stroke-width="1.5" stroke-linecap="round"/>'),
    dir:  (stroke, fill) => `<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M3 7c0-1.1.9-2 2-2h4l2 2h8c1.1 0 2 .9 2 2v9c0 1.1-.9 2-2 2H5c-1.1 0-2-.9-2-2V7z" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/></svg>`,
};

function fileIcon(name) {
    const ext = name.split('.').pop().toLowerCase();
    return ICONS[ext] || ICONS.file;
}
function typeBadge(name) {
    const ext = name.split('.').pop().toUpperCase();
    const cls = { HTML:'badge-html', JSON:'badge-json', MD:'badge-md', ZIP:'badge-zip' };
    const c = cls[ext];
    return c ? `<span class="type-badge ${c}">${ext}</span>` : '';
}
function fmtBytes(n) {
    if (!n) return '—';
    if (n < 1024) return n + ' B';
    if (n < 1048576) return Math.round(n/1024) + ' KB';
    return (n/1048576).toFixed(1) + ' MB';
}
function humanize(k) {
    return k.split(/[-_]/).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}
function groupKey(filename) {
    const base  = filename.replace(/\.[^.]+$/, '');
    const parts = base.split('-');
    const kept  = parts.slice(0, 2);
    kept[kept.length-1] = kept[kept.length-1].replace(/[0-9]+$/, '');
    return kept.join('-') || base;
}

// ── GitHub API (with session cache) ──
async function fetchTree(bust) {
    if (!bust) {
        try { const c = sessionStorage.getItem(CACHE_KEY); if (c) return JSON.parse(c); } catch {}
    }
    const res = await fetch(`https://api.github.com/repos/${REPO}/git/trees/${BRANCH}?recursive=1`);
    if (!res.ok) throw new Error('GitHub API ' + res.status);
    const data = await res.json();
    try { sessionStorage.setItem(CACHE_KEY, JSON.stringify(data.tree)); } catch {}
    return data.tree;
}

// ── Dashboard builder ──
function buildDashboard(tree) {
    const loader  = document.getElementById('dashboard-loader');
    const content = document.getElementById('dashboard-content');
    loader.style.display  = 'none';
    content.style.display = '';
    content.innerHTML     = '';

    const paths    = new Set(tree.map(t => t.path));
    const rootDirs = tree.filter(t => t.type==='tree' && !t.path.includes('/') && !ARCHIVE_DIRS.has(t.path) && !t.path.startsWith('.'));
    const appDirs  = rootDirs.filter(d => paths.has(d.path + '/index.html'));
    const rootHtml = tree.filter(t => t.type==='blob' && !t.path.includes('/') && t.path.endsWith('.html') && !SKIP_DASH_FILES.has(t.path));

    const sections = [];

    appDirs.forEach(d => {
        const meta  = PROJECT_META[d.path] || {};
        const iFile = tree.find(t => t.path === d.path + '/index.html');
        sections.push({
            label: (meta.icon||'🗂') + '\u00a0 ' + (meta.label||humanize(d.path)),
            items: [{ href: d.path+'/', title: meta.label||humanize(d.path), filename: d.path+'/index.html', size: fmtBytes(iFile&&iFile.size), color: meta.color||null }],
        });
    });

    const groups = {};
    rootHtml.forEach(f => { const k=groupKey(f.path); (groups[k]=groups[k]||[]).push(f); });
    Object.entries(groups).forEach(([k, files]) => {
        const meta = PROJECT_META[k] || {};
        sections.push({
            label: (meta.icon||'📁') + '\u00a0 ' + (meta.label||humanize(k)),
            items: files.map(f => ({ href:f.path, title:humanize(f.path.replace(/\.[^.]+$/,'')), filename:f.path, size:fmtBytes(f.size), color:null })),
        });
    });

    if (!sections.length) { content.innerHTML='<div style="color:var(--text-tertiary);text-align:center;padding:48px">앱/파일이 없습니다</div>'; return; }

    sections.forEach((sec, i) => {
        if (i) content.insertAdjacentHTML('beforeend', '<div class="divider"></div>');
        content.insertAdjacentHTML('beforeend',
            `<div class="section-label" style="margin-top:8px">${sec.label}</div>
            <div class="card-grid" style="margin-bottom:16px">
            ${sec.items.map(item=>`
                <a class="fcard" href="${item.href}" ${item.color?`style="border-color:${item.color}44"`:''}><div class="fcard-title" ${item.color?`style="color:${item.color}"`:''}>${item.title}</div><div class="fcard-filename">${item.filename}</div><div class="fcard-meta"><span></span><span class="fcard-size">${item.size}</span></div></a>`).join('')}
            </div>`);
    });
}

// ── Explorer builder ──
function buildExplorer(tree) {
    const fileTree = document.getElementById('fileTree');
    fileTree.innerHTML = '';
    let total = 0;

    const visible   = tree.filter(t => !t.path.startsWith('.'));
    const rootFiles = visible.filter(t => t.type==='blob' && !t.path.includes('/'));
    const rootDirs  = visible.filter(t => t.type==='tree' && !t.path.includes('/'));
    const dirMap    = {};
    visible.filter(t => t.path.split('/').length===2).forEach(t => {
        const d = t.path.split('/')[0];
        (dirMap[d]=dirMap[d]||[]).push(t);
    });

    rootFiles.sort((a,b)=>a.path.localeCompare(b.path)).forEach(f => {
        total++;
        fileTree.insertAdjacentHTML('beforeend', fileRowHtml(f.path, f.path, fmtBytes(f.size), false));
    });
    fileTree.insertAdjacentHTML('beforeend', '<li class="tree-sep"></li>');

    rootDirs.sort((a,b)=>a.path.localeCompare(b.path)).forEach(d => {
        const meta     = PROJECT_META[d.path] || {};
        const children = (dirMap[d.path]||[]).sort((a,b)=>a.path.localeCompare(b.path));
        const isApp    = children.some(c=>c.path===d.path+'/index.html');
        const col      = meta.color || (isApp?'#4ade80':null);
        const stroke   = col ? col+'b3' : 'rgba(6,182,212,0.7)';
        const fill     = col ? col+'33' : 'rgba(6,182,212,0.2)';
        const fid      = 'folder-' + d.path.replace(/[^a-zA-Z0-9]/g,'_');
        const childHtml = children.map(c=>{ total++; return fileRowHtml(c.path, c.path.split('/').pop(), fmtBytes(c.size), true); }).join('');
        fileTree.insertAdjacentHTML('beforeend', `
            <li class="tree-item folder-item" data-name="${d.path}" id="${fid}">
                <div class="tree-row folder-row" onclick="toggleFolder('${fid}')">
                    <div class="row-name">
                        <span class="chevron open" id="chevron-${fid}">▶</span>
                        <span class="file-icon">${ICONS.dir(stroke,fill)}</span>
                        <span class="row-label folder-label"${col?` style="color:${col}"`:''}>${d.path}</span>
                        <span class="type-badge badge-dir">DIR</span>
                    </div>
                    <span class="row-size">—</span><span class="row-date">—</span>
                </div>
                <ul class="tree folder-children" id="children-${fid}">${childHtml}</ul>
            </li>`);
    });

    document.querySelectorAll('.folder-children:not(.collapsed)').forEach(el => { el.style.maxHeight = el.scrollHeight + 'px'; });
    document.getElementById('fileCount').textContent = total + ' items';
}

function fileRowHtml(href, name, size, indented) {
    const isLink   = /\.(html|md|json)$/.test(name);
    const indent   = indented ? '<span class="indent" style="width:20px"></span>' : '';
    const openTag  = isLink ? `<a class="tree-row" href="${href}">` : '<div class="tree-row" style="cursor:default">';
    const closeTag = isLink ? '</a>' : '</div>';
    return `
        <li class="tree-item" data-name="${name}">
            ${openTag}<div class="row-name">${indent}<span class="chevron" style="visibility:hidden"></span><span class="file-icon">${fileIcon(name)}</span><span class="row-label${isLink?' file-link':''}"${!isLink?' style="color:var(--text-secondary)"':''}>${name}</span>${typeBadge(name)}</div><span class="row-size">${size}</span><span class="row-date">—</span>${closeTag}
        </li>`;
}

// ── Init ──
async function init(bust) {
    document.getElementById('dashboard-loader').style.display = '';
    document.getElementById('dashboard-content').style.display = 'none';
    document.getElementById('refreshBtn').disabled = true;
    document.getElementById('fileTree').innerHTML = '<li style="pointer-events:none"><div class="tree-row" style="color:var(--text-tertiary);font-size:12px;padding:12px 16px">로딩 중...</div></li>';
    try {
        const tree = await fetchTree(bust);
        buildDashboard(tree);
        buildExplorer(tree);
    } catch(e) {
        document.getElementById('dashboard-loader').style.display = 'none';
        document.getElementById('dashboard-content').style.display = '';
        document.getElementById('dashboard-content').innerHTML = `<div style="color:var(--danger);text-align:center;padding:48px;font-size:13px">GitHub API 연결 실패<br><small style="color:var(--text-tertiary)">${e.message}</small></div>`;
        document.getElementById('fileTree').innerHTML = '';
    } finally {
        document.getElementById('refreshBtn').disabled = false;
    }
}
init();
document.getElementById('refreshBtn').addEventListener('click', () => { sessionStorage.removeItem(CACHE_KEY); init(true); });

// ── View switch ──
function switchView(name) {
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('view-'+name).classList.add('active');
    document.getElementById('tab-'+name).classList.add('active');
    const sb = document.getElementById('searchBarWrap');
    if (name==='explorer') { sb.classList.add('visible'); }
    else { sb.classList.remove('visible'); document.getElementById('searchInput').value=''; document.getElementById('searchClear').style.display='none'; filterTree(''); }
}

// ── Folder toggle ──
function toggleFolder(fid) {
    const ch  = document.getElementById('children-'+fid);
    const chv = document.getElementById('chevron-'+fid);
    if (!ch) return;
    if (ch.classList.contains('collapsed')) { ch.classList.remove('collapsed'); ch.style.maxHeight=ch.scrollHeight+'px'; chv.classList.add('open'); }
    else { ch.classList.add('collapsed'); ch.style.maxHeight='0'; chv.classList.remove('open'); }
}
document.getElementById('expandAll').addEventListener('click', () => {
    document.querySelectorAll('.folder-children').forEach(el=>{ el.classList.remove('collapsed'); el.style.maxHeight=el.scrollHeight+'px'; });
    document.querySelectorAll('.chevron[id^="chevron-"]').forEach(c=>c.classList.add('open'));
});
document.getElementById('collapseAll').addEventListener('click', () => {
    document.querySelectorAll('.folder-children').forEach(el=>{ el.classList.add('collapsed'); el.style.maxHeight='0'; });
    document.querySelectorAll('.chevron[id^="chevron-"]').forEach(c=>c.classList.remove('open'));
});

// ── Search ──
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');
const fileCountEl = document.getElementById('fileCount');
const emptyState  = document.getElementById('emptyState');
function filterTree(q) {
    q = (q||'').toLowerCase().trim();
    document.querySelectorAll('#fileTree li.tree-item').forEach(item => {
        const name=item.dataset.name.toLowerCase(), isF=item.classList.contains('folder-item');
        if (!q) { item.style.display=''; return; }
        if (isF) {
            let hit=false;
            item.querySelectorAll('li.tree-item').forEach(c=>{ const cn=c.dataset.name.toLowerCase(); c.style.display=cn.includes(q)?(hit=true,''):'none'; });
            item.style.display=(name.includes(q)||hit)?'':'none';
            if (name.includes(q)||hit){ const fc=item.querySelector('.folder-children'); if(fc){fc.classList.remove('collapsed');fc.style.maxHeight=fc.scrollHeight+'px';} }
        } else { item.style.display=name.includes(q)?'':'none'; }
    });
    if (!q) {
        document.querySelectorAll('.tree-sep').forEach(s=>s.style.display='');
        fileCountEl.textContent=document.querySelectorAll('#fileTree li.tree-item:not(.folder-item)').length+' items';
        emptyState.style.display='none';
    } else {
        document.querySelectorAll('.tree-sep').forEach(s=>s.style.display='none');
        const vis=[...document.querySelectorAll('#fileTree li.tree-item')].filter(i=>i.style.display!=='none'&&!i.classList.contains('folder-item')).length;
        fileCountEl.textContent=vis+' 건 일치'; emptyState.style.display=vis===0?'block':'none';
    }
}
searchInput.addEventListener('input',()=>{ searchClear.style.display=searchInput.value?'block':'none'; filterTree(searchInput.value); });
searchClear.addEventListener('click',()=>{ searchInput.value=''; searchClear.style.display='none'; filterTree(''); searchInput.focus(); });

</script>
